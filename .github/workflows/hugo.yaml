# Workflow for building and deploying a Hugo site natively to GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.2
      HUGO_ENVIRONMENT: production
      TZ: America/Los_Angeles
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # This completely replaces the manual wget download step safely
      - name: Setup Hugo CLI
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.2'
          extended: true # Automatically loads the extended Sass compiler version

      - name: Install Dart Sass
        run: sudo snap install dart-sass
        
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.sha }}
          restore-keys: |
            hugo-
      
      - name: Configure Git
        run: git config core.quotepath false
      
      - name: Install postcss-cli
        run: npm install -g postcss-cli && npm install autoprefixer && npm audit fix
  
      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --baseURL "https://hisnr.com/orca/"

      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v4
        if: steps.cache-restore.outputs.cache-hit != 'true'
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.sha }}

      - name: Push to Main Website Repo
        id: deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.HISNR_TOKEN }} 
          external_repository: HI-SNR-Lab/HI-SNR.github.io
          publish_branch: main        
          publish_dir: ./public
          destination_dir: orca       
          keep_files: true            
          enable_jekyll: false